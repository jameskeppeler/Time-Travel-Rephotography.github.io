name: CI

on:
  push:
    branches: [main, "gui-*", "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.10"]
    steps:
      - uses: actions/checkout@v4
        with:
          # losses/contextual_loss is a git submodule; TestContextualLossKillswitch
          # reads a file inside it, so it must be checked out.
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install lightweight test deps
        run: |
          python -m pip install --upgrade pip
          # numpy + pytest cover the unit tests. opencv-python-headless is
          # required because tests/test_color_blend.py imports utils.color_blend,
          # which imports cv2 at module load. torch / dlib / tensorflow are
          # intentionally absent — projector/GPU tests belong on a
          # self-hosted runner.
          pip install numpy pytest opencv-python-headless

      - name: Install PySide6 for GUI smoke test (Python >= 3.9)
        if: matrix.python-version != '3.8'
        run: pip install PySide6==6.7.3

      - name: Install offscreen Qt platform dependencies (Linux)
        if: matrix.python-version != '3.8'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 libdbus-1-3

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
        # TestContentHash exercises tools.match_skin_histogram, which imports
        # torch. torch is intentionally absent from this lightweight CI
        # (projector/GPU tests belong on a self-hosted runner), so deselect it.
        run: pytest tests/ -v --deselect tests/test_audit_fixes.py::TestContentHash

  lint:
    name: Syntax + lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Compile-check all Python files
        run: python -m compileall -q gui projector.py projector_batch.py losses tools utils optim op models

      - name: Ruff (error class only, non-blocking style)
        run: ruff check --select E,F,W --output-format=github .
        continue-on-error: true
