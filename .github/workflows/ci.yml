name: CI

on:
  push:
    branches: [main, "gui-*", "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.10"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install lightweight test deps
        run: |
          python -m pip install --upgrade pip
          # Only what the existing test suite (tests/test_color_blend.py) needs.
          # Heavy deps (torch, PySide6, dlib, tensorflow) are intentionally
          # NOT installed here to keep CI fast; project tests for those
          # modules should be added under a separate workflow with a
          # self-hosted GPU runner.
          pip install numpy pytest

      - name: Run pytest
        run: pytest tests/ -v

  lint:
    name: Syntax + lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Compile-check all Python files
        run: python -m compileall -q gui projector.py projector_batch.py losses tools utils optim op models

      - name: Ruff (error class only, non-blocking style)
        run: ruff check --select E,F,W --output-format=github .
        continue-on-error: true
